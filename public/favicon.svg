<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient for the outer glow / stroke -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#ab20fd" />
    </linearGradient>

    <!-- Drop shadow filter for glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background shape so it looks good on both light/dark tabs -->
  <rect width="512" height="512" rx="128" fill="#0a0a0a" />

  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#glowGrad)" stroke-width="20" filter="url(#glow)" />
  
  <!-- Inner dotted orbit ring (Constellation Theme) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#27272a" stroke-width="4" stroke-dasharray="16 12" />

  <!-- Futuristic Stylized 'K' Letter -->
  <g filter="url(#glow)">
    <!-- Vertical stem -->
    <rect x="175" y="140" width="32" height="232" rx="8" fill="url(#glowGrad)" />
    
    <!-- Top branch -->
    <path d="M 200 260 L 305 145 A 16 16 0 0 1 328 168 L 245 260 Z" fill="url(#glowGrad)" />
    
    <!-- Bottom branch -->
    <path d="M 215 250 L 315 365 A 16 16 0 0 1 292 388 L 195 278 Z" fill="url(#glowGrad)" />

    <!-- A glowing central node/star in the intersection of 'K' -->
    <circle cx="256" cy="256" r="22" fill="#ffffff" />
    <circle cx="256" cy="256" r="14" fill="#00f0ff" opacity="0.8" />
  </g>
</svg>
